<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitab — Timer & Mini-Player</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared-styles.css">
<style>
.timer-bar{display:flex;gap:6px;padding:8px 12px;background:var(--surface);border-top:1px solid var(--g100);flex-shrink:0;overflow-x:auto;z-index:250;position:relative}.timer-bar::-webkit-scrollbar{display:none}
.timer-chip{display:flex;align-items:center;gap:5px;background:var(--g50);border-radius:10px;padding:8px 10px;cursor:pointer;flex-shrink:0;flex:1;min-width:0;transition:all .2s;border:2px solid transparent}
.timer-chip.active-chip{border-color:var(--primary);background:rgba(13,115,119,.06)}
.timer-chip.paused{opacity:.65}
.t-icon{font-size:12px;flex-shrink:0}.t-name{font-size:10px;font-weight:500;color:var(--tp);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;min-width:0}
.t-time{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--primary);flex-shrink:0;white-space:nowrap}
.timer-chip.paused .t-time{color:var(--g400)}
/* Bottom sheet */
.bs-backdrop{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:150}
.timer-bs{position:absolute;left:0;right:0;bottom:120px;background:var(--surface);border-radius:20px 20px 0 0;z-index:200;box-shadow:0 -8px 32px rgba(0,0,0,.1)}
.bs-handle{display:flex;justify-content:center;padding:10px 0 6px}.handle-bar{width:36px;height:4px;background:var(--g300);border-radius:2px}
.bs-body{padding:0 24px 24px}
.bs-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.bs-label{font-family:'DM Serif Display',serif;font-size:18px;color:var(--tp)}
.bs-x{width:30px;height:30px;border-radius:50%;background:var(--g100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--g500)}
.timer-display{text-align:center;margin-bottom:20px}
.timer-big{font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:600;color:var(--tp);letter-spacing:2px}
.timer-status{font-size:12px;margin-top:4px;font-weight:500}
.timer-status.running{color:var(--primary)}
.timer-status.paused-st{color:var(--warning)}
.timer-actions{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.timer-act-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:20px}
.btn-pause{background:rgba(196,132,29,.1);color:var(--warning)}
.btn-stop{background:rgba(196,61,61,.1);color:var(--error)}
.tf-group{margin-bottom:14px}
.tf-label{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.tf-input{width:100%;padding:10px 12px;border:1.5px solid var(--g200);border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--tp);outline:none}
.tf-input:focus{border-color:var(--primary)}
.tf-cat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--primary);margin-top:4px}
.more-det{font-size:13px;color:var(--primary);font-weight:500;cursor:pointer;margin-top:14px;display:flex;align-items:center;gap:4px}
.faded-home{padding:60px 16px 16px;opacity:.3;pointer-events:none}
.faded-card2{background:var(--surface);border-radius:12px;height:120px;margin-bottom:12px;box-shadow:0 1px 3px rgba(26,24,21,.06)}
.faded-item2{background:var(--surface);border-radius:12px;height:56px;margin-bottom:8px;box-shadow:0 1px 3px rgba(26,24,21,.06)}
</style>
</head>
<body>
<div class="page-header">
  <div class="page-title">Timer & Mini-Player</div>
  <div class="page-subtitle">Timer entry form + 3 mini-timer widgets | <a href="../docs/spec.html#fab">Back to Spec</a></div>
</div>

<div class="row">
<div class="phone-frame"><div class="ds phone">
<div class="dyn-isl"></div>
<div class="stat-bar"><span>8:00 AM</span><span style="font-size:11px">📶 🔋</span></div>

<div class="faded-home">
  <div class="faded-card2"></div>
  <div class="faded-item2"></div>
  <div class="faded-item2"></div>
  <div class="faded-item2"></div>
</div>

<div class="bs-backdrop"></div>

<div class="timer-bs">
  <div class="bs-handle"><div class="handle-bar"></div></div>
  <div class="bs-body">
    <div class="bs-top"><div class="bs-label">Timer</div><button class="bs-x">✕</button></div>

    <div class="timer-display">
      <div class="timer-big">00:35:12</div>
      <div class="timer-status running">● Running</div>
    </div>

    <div class="timer-actions">
      <button class="timer-act-btn btn-pause" title="Pause">⏸</button>
      <button class="timer-act-btn btn-stop" title="Stop">■</button>
    </div>

    <div class="tf-group">
      <div class="tf-label">Activity</div>
      <input class="tf-input" value="Morning Run" placeholder="Search or type a name...">
      <div class="tf-cat">🏃 Health & Fitness</div>
    </div>

    <div class="tf-group">
      <div class="tf-label">Started at</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--tp)">7:25 AM, Apr 2, 2026 EDT</div>
        <span style="font-size:11px;color:var(--primary);cursor:pointer;font-weight:500">✎ Edit</span>
      </div>
    </div>

    <div class="more-det">▼ More details</div>
  </div>
</div>

<!-- Timer bar with 3 timers -->
<div class="timer-bar">
  <div class="timer-chip active-chip"><span class="t-icon">⏱️</span><span class="t-name">Morning Run</span><span class="t-time">00:35:12</span></div>
  <div class="timer-chip"><span class="t-icon">⏱️</span><span class="t-name">Cooking</span><span class="t-time">00:12:45</span></div>
  <div class="timer-chip paused"><span class="t-icon">⏸</span><span class="t-name">Study Arabic</span><span class="t-time">00:08:30</span></div>
</div>

<div class="bnav" style="z-index:250;position:relative">
  <button class="ni a"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-8.5L12 3l8 8.5z"/></svg><span class="nl">Home</span></button>
  <button class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19V5a2 2 0 0 1 2-2h8l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/></svg><span class="nl">Book</span></button>
  <button class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 18V12h4v6M10 18V8h4v10M16 18V4h4v14"/></svg><span class="nl">Insights</span></button>
  <button class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="9" r="4"/><path d="M17 19v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/></svg><span class="nl">Social</span></button>
  <button class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg><span class="nl">Profile</span></button>
</div>
</div></div>
</div>
</body>
</html>
