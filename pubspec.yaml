name: kitab
description: "Track your journey. Grow every day."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # ═══ State Management ═══
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ═══ Backend & Auth ═══
  supabase_flutter: ^2.9.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # ═══ Local Database ═══
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.30

  # ═══ Routing ═══
  go_router: ^14.8.1

  # ═══ Design System ═══
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0

  # ═══ Maps & Location ═══
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ═══ Notifications ═══
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # ═══ Security ═══
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # ═══ Analytics & Monitoring ═══
  # posthog_flutter: ^4.0.0  # Enable when PostHog account is set up
  sentry_flutter: ^8.14.2

  # ═══ Networking ═══
  dio: ^5.7.0

  # ═══ Utilities ═══
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ═══ Charts ═══
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true

  assets:
    - .env
